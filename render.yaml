services:
  - type: web
    name: policy-rag-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m scripts.ingest
    startCommand: gunicorn --config gunicorn.conf.py app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: TOP_K
        value: "4"
      - key: SIMILARITY_THRESHOLD
        value: "0.3"
