services:
  - type: web
    name: policy-rag-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && HF_HUB_OFFLINE=0 python -m scripts.ingest
    startCommand: gunicorn --config gunicorn.conf.py app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      # Render only carries the project directory from build into runtime, so
      # the default ~/.cache/huggingface model cache is lost and every cold
      # start re-downloads the embedding model. Cache it inside the project
      # dir and run fully offline at runtime (build overrides HF_HUB_OFFLINE
      # inline to do the one-time download).
      - key: HF_HOME
        value: /opt/render/project/src/.hf-cache
      - key: HF_HUB_OFFLINE
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: TOP_K
        value: "4"
      - key: SIMILARITY_THRESHOLD
        value: "0.3"
